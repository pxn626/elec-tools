baseURL = 'https://elec.webpenson.com/'
defaultContentLanguage = 'zh'
theme = "PaperMod"

[outputs]
    home = ["HTML", "RSS", "JSON"]
[outputFormats]
        [outputFormats.JSON]
            baseName = "searchindex"
            isPlainText = true
            mediaType = "application/json"

[languages.zh]
    languageCode = 'zh-CN'
    languageName = '简体中文'
    title = '电气工具箱'
    weight = 1

[menu]
    [[menu.main]]
        identifier = "home"
        name = "首页"
        url = "/"
        weight = 1

    [[menu.main]]
        identifier = "categories"
        name = "工具分类"
        url = "/categories/"
        weight = 2

    [[menu.main]]
        identifier = "about"
        name = "关于"
        url = "/about/"
        weight = 3

[params]
    search = true
    showSearch = true
    [params.searchConfig]
        fuseOpts = { isCaseSensitive = false, includeScore = true, shouldSort = true, threshold = 0.3, location = 0, distance = 100, maxPatternLength = 32, minMatchCharLength = 1, keys = ["title", "content"] }

    ShowNav = true
    disableSpecial1stPost = true

    [env]
        production = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true