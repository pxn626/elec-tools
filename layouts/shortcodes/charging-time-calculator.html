<div class="tool-container" id="charging-time-tool">
  <style>
    #charging-time-tool { max-width: 720px; margin: 24px auto; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    #charging-time-tool .ct-card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e5e7eb; }
    #charging-time-tool .ct-input-group { margin-bottom: 18px; }
    #charging-time-tool label { display: block; font-weight: 600; margin-bottom: 6px; color: #1f2937; }
    #charging-time-tool input[type="number"] { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    #charging-time-tool input[type="number"]:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    #charging-time-tool .ct-presets { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
    #charging-time-tool .ct-preset { padding: 8px 14px; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    #charging-time-tool .ct-preset:hover { background: #2563eb; color: white; border-color: #2563eb; }
    #charging-time-tool .ct-result { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px; padding: 18px; margin-top: 18px; display: none; }
    #charging-time-tool .ct-result.active { display: block; }
    #charging-time-tool .ct-result h3 { margin: 0 0 12px 0; color: #0369a1; font-size: 18px; }
    #charging-time-tool .ct-time-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #cbd5e1; }
    #charging-time-tool .ct-time-row:last-child { border-bottom: none; }
    #charging-time-tool .ct-time-label { color: #475569; }
    #charging-time-tool .ct-time-val { font-weight: 700; color: #0c4a6e; font-size: 16px; }
    #charging-time-tool .ct-tip { font-size: 13px; color: #64748b; margin-top: 14px; padding: 10px; background: #f8fafc; border-radius: 6px; }
    @media (prefers-color-scheme: dark) {
      #charging-time-tool .ct-card { background: #1e293b; border-color: #334155; }
      #charging-time-tool label { color: #e2e8f0; }
      #charging-time-tool input[type="number"] { background: #0f172a; color: #e2e8f0; border-color: #334155; }
      #charging-time-tool .ct-result { background: #082f49; border-color: #075985; }
      #charging-time-tool .ct-time-val { color: #7dd3fc; }
      #charging-time-tool .ct-tip { background: #0f172a; color: #94a3b8; }
    }
  </style>

  <div class="ct-card">
    <div class="ct-input-group">
      <label>电池容量 (kWh)</label>
      <input type="number" id="ct-capacity" value="60" min="1" max="200" step="0.5">
    </div>
    <div class="ct-input-group">
      <label>充电功率 (kW)</label>
      <input type="number" id="ct-power" value="7" min="0.5" max="350" step="0.5">
      <div class="ct-presets">
        <span class="ct-preset" onclick="document.getElementById('ct-power').value=7">7kW 家用慢充</span>
        <span class="ct-preset" onclick="document.getElementById('ct-power').value=11">11kW 三相交流</span>
        <span class="ct-preset" onclick="document.getElementById('ct-power').value=22">22kW 双枪交流</span>
        <span class="ct-preset" onclick="document.getElementById('ct-power').value=120">120kW 直流快充</span>
        <span class="ct-preset" onclick="document.getElementById('ct-power').value=250">250kW 特斯拉超充</span>
      </div>
    </div>
    <div class="ct-input-group">
      <label>充电效率 (%) — 默认 90%</label>
      <input type="number" id="ct-eff" value="90" min="50" max="100" step="1">
    </div>

    <div class="ct-result" id="ct-result">
      <h3>预计充电时间</h3>
      <div class="ct-time-row"><span class="ct-time-label">20% → 80%(日常)</span><span class="ct-time-val" id="ct-t60">--</span></div>
      <div class="ct-time-row"><span class="ct-time-label">0% → 80%(快充主流)</span><span class="ct-time-val" id="ct-t80">--</span></div>
      <div class="ct-time-row"><span class="ct-time-label">0% → 100%(满充满放)</span><span class="ct-time-val" id="ct-t100">--</span></div>
      <div class="ct-time-row"><span class="ct-time-label">50% → 80%(应急补能)</span><span class="ct-time-val" id="ct-t30">--</span></div>
      <div class="ct-tip" id="ct-tip"></div>
    </div>
  </div>

  <script>
  (function(){
    function fmtTime(hours) {
      if (!isFinite(hours) || hours < 0) return '--';
      var h = Math.floor(hours);
      var m = Math.round((hours - h) * 60);
      if (h === 0) return m + ' 分钟';
      if (m === 0) return h + ' 小时';
      return h + ' 小时 ' + m + ' 分';
    }
    function calc() {
      var C = parseFloat(document.getElementById('ct-capacity').value);
      var P = parseFloat(document.getElementById('ct-power').value);
      var E = parseFloat(document.getElementById('ct-eff').value) / 100;
      if (!C || !P || !E || C <= 0 || P <= 0 || E <= 0) return;
      var t60 = (C * 0.6) / (P * E);
      var t80 = (C * 0.8) / (P * E);
      var t100 = (C * 1.0) / (P * E);
      var t30 = (C * 0.3) / (P * E);
      document.getElementById('ct-t60').textContent = fmtTime(t60);
      document.getElementById('ct-t80').textContent = fmtTime(t80);
      document.getElementById('ct-t100').textContent = fmtTime(t100);
      document.getElementById('ct-t30').textContent = fmtTime(t30);
      var tip = '';
      if (P >= 100) tip = '提示:直流快充功率峰值仅在 20%-80% SOC 区间达到,80% 后进入涓流,实际时间略长于计算值。';
      else if (P >= 22) tip = '提示:22kW 需三相 380V 电表,部分车型车载充电机限制 11kW。';
      else if (P <= 7) tip = '提示:7kW 慢充几乎不损伤电池,适合日常家用;冬季低温充电时间可能延长 20-30%。';
      document.getElementById('ct-tip').textContent = tip;
      document.getElementById('ct-result').classList.add('active');
    }
    ['ct-capacity','ct-power','ct-eff'].forEach(function(id){
      var el = document.getElementById(id);
      el.addEventListener('input', calc);
      el.addEventListener('change', calc);
    });
    document.querySelectorAll('#charging-time-tool .ct-preset').forEach(function(p){
      p.addEventListener('click', function(){ setTimeout(calc, 50); });
    });
    calc();
  })();
  </script>
</div>
